  {id:546,cat:"法規制",q:"「中国のAI規制」の3段階の規制フレームワークは？",a:"①アルゴリズム推薦規制（2022年）②ディープシンセシス（AI生成コンテンツ）規制（2023年）③生成AIサービス規制（2023年）。実名登録・AI生成物のラベル表示が義務付けられた。"},
  {id:547,cat:"データ保護",q:"「パーソナルデータストア（PDS）」のAI活用への応用は？",a:"個人が自分のデータを管理し選択的に企業やAIに提供できるインフラ。AIのパーソナライズにデータを活用しながら、個人がコントロールを持つプライバシー保護の新パラダイム。"},
  {id:548,cat:"AI基礎",q:"「生成AIの社会的インパクト評価（Social Impact Assessment）」とは？",a:"AI技術の導入・普及が雇用・教育・民主主義・格差・環境などに与える正負の影響を事前・事後に系統的に評価する方法論。政策立案に活用される。"},
  {id:549,cat:"生成AI技術",q:"「AIによるコンテンツモデレーション」とは何か？",a:"SNS・プラットフォーム上の有害コンテンツ（ヘイトスピーチ・誤情報・暴力的コンテンツ）をAIが自動検出・除去する仕組み。人間のモデレーターと組み合わせて使われる。"},
  {id:550,cat:"LLM",q:"「Model Card（モデルカード）」に記載すべき標準的な内容は？",a:"①モデルの詳細（アーキテクチャ・パラメータ数）②学習データの概要③意図された使用用途と制限④性能指標とベンチマーク⑤バイアスと公平性の評価⑥倫理的考慮事項"},
  {id:551,cat:"最新モデル",q:"「Replit AI・Bolt.new・v0などのAIコーディングプラットフォーム」の特徴は？",a:"自然言語でウェブアプリ・コンポーネントをゼロから生成できるAI開発プラットフォーム。プロンプトだけでフルスタックのアプリを数分で作れ、プログラミング経験なしでも利用可能。"},
  {id:552,cat:"プロンプト",q:"「AIで会議アジェンダを作成する」プロンプトの例は？",a:"「明日の30分ミーティングのアジェンダを作成してください。目的：Q3目標の進捗確認。参加者：営業チーム5名。優先事項：数値報告、課題の共有、来週のアクションの決定。箇条書き形式で。」"},
  {id:553,cat:"RAG・エージェント",q:"「AIエージェントのPlan-and-Execute（計画と実行）パターン」とは？",a:"まずプランナーLLMがタスクを小ステップに分解し計画を立て、その後エグゼキューターが各ステップを実行するアーキテクチャ。ReActより複雑なタスクに有効。"},
  {id:554,cat:"著作権・倫理",q:"「AIの「説明責任の空白（Accountability Gap）」とは何か？",a:"AIが引き起こした損害に対して、開発者・提供者・利用者の誰が責任を負うのか不明確になる問題。特に自律的なAIエージェントの行動の責任帰属が課題。"},
  {id:555,cat:"セキュリティ",q:"「Retrieval Poisoning（検索汚染）」攻撃とは何か？",a:"RAGシステムのベクトルDB（知識ベース）に悪意あるドキュメントを挿入し、検索にヒットさせることでLLMに意図した内容を生成させる攻撃。"},
  {id:556,cat:"法規制",q:"「AI新法の「国民の責務（第8条）」とは何か？",a:"国民は、人工知能関連技術の研究開発・活用の推進の重要性に関する理解を深めるよう努めるとともに、国や地方公共団体の施策に協力するよう努めるものとする。"},
  {id:557,cat:"データ保護",q:"「プライバシーエンハンシングテクノロジー（PET）」の種類は？",a:"差分プライバシー・準同型暗号・秘密計算・フェデレーテッドラーニング・ゼロナレッジ証明・k-匿名性など。個人データを保護しながらAI学習・分析を行う技術群。"},
  {id:558,cat:"AI基礎",q:"「エッジAI（Edge AI）」とクラウドAIの違いは？",a:"エッジAI：スマートフォン・IoTデバイスなどのエンドポイントでAIを実行。レイテンシ低・プライバシー高・オフライン動作可。クラウドAI：大規模計算・高性能だがネットワーク依存・遅延あり。"},
  {id:559,cat:"生成AI技術",q:"「マルチエージェントLLMでのコンフリクト解決」の仕組みは？",a:"複数エージェントが異なる意見を出した場合、オーケストレーターが多数決・重み付き投票・さらなる対話・人間への委譲などで最終判断を下す調整機構。"},
  {id:560,cat:"LLM",q:"「LLMの「知識カットオフ（Knowledge Cutoff）」」がビジネスで問題になる場面は？",a:"最新の法改正・直近の市場データ・新製品情報・直近のニュースなど、トレーニングデータ以降の情報が必要なタスク。RAGや検索ツールで補完するのが標準対応。"},
  {id:561,cat:"最新モデル",q:"「Anthropic Claude API」の「Artifacts（成果物）」機能とは何か？",a:"ClaudeがコードスニペットやHTMLを生成した際に、クリック可能なプレビューとしてレンダリングし実行・確認できる機能。Claude.aiのUIで提供されている。"},
  {id:562,cat:"プロンプト",q:"「XML・Markdown・JSONで構造化されたプロンプト」はいつ使うべきか？",a:"複数の入力コンポーネント（背景・指示・例示・制約）を明確に区別したい場合や、APIで大量のプロンプトを管理・テンプレート化する場合に有効。"},
  {id:563,cat:"RAG・エージェント",q:"「Document Intelligence（文書知性化）」とは何か？",a:"PDF・Word・Excel・スキャン文書などの非構造化ドキュメントからAIが情報を抽出・理解・構造化する技術群。RAG前処理の重要ステップ。Azure Document Intelligenceなどが提供。"},
  {id:564,cat:"著作権・倫理",q:"「AIと人間の共同創作の著作権帰属」の考え方は？",a:"人間がAIを道具として使い、創作的な指示・選択・編集を行っている場合は人間の著作物として認められる可能性が高い。AIへの関与度・創造性の比率が鍵となる。"},
  {id:565,cat:"セキュリティ",q:"「AIの安全性テスト（Safety Evaluation）」で使われる手法は？",a:"レッドチーミング・自動敵対的テスト・ベンチマーク（TruthfulQA・WinoBias等）・人間評価・カテゴリ別ハームテスト（CBRN・性的・暴力的コンテンツ等）を組み合わせる。"},
  {id:566,cat:"法規制",q:"「日本の「AI新法」と「EU AI法」の規制アプローチの比較」は？",a:"EU AI法：ハードロー・リスクベース義務・罰則あり。日本AI新法：ソフトロー・推進法・罰則なし。日本は規制よりイノベーション促進を優先するアプローチを選択。"},
  {id:567,cat:"データ保護",q:"「個人情報を含む業務データでのAI活用」のガバナンス対策は？",a:"①入力マスキング（自動PIIスクラビング）②企業専用エンドポイント（学習非使用API）の利用③利用前のプライバシー影響評価④従業員へのAI利用ポリシー教育"},
  {id:568,cat:"AI基礎",q:"「AI活用のROI（投資対効果）計算」の具体例は？",a:"例：月40時間の書類作成が生成AI導入で月8時間に削減→32時間節約×時給3000円＝月96000円削減。年間115万円効果からAPI費用（月2万円×12）を引いた純効果。"},
  {id:569,cat:"生成AI技術",q:"「パラメータ効率的ファインチューニング（PEFT）」の手法を3つ挙げよ。",a:"①LoRA（低ランク行列適応）②Prefix Tuning（プレフィックストークン学習）③Adapter（小さなアダプタ層を挿入）。元のモデルを凍結したまま少ないパラメータで効率的に適応できる。"},
  {id:570,cat:"LLM",q:"「LLMを使った自動テスト生成」の活用例と注意点は？",a:"活用例：ユニットテスト・境界値テストの自動生成・バグ再現テストの作成。注意点：AIが見落とすエッジケース・AIが生成したテスト自体のバグの可能性・生成テストのレビュー必須。"},
  {id:571,cat:"最新モデル",q:"「Claude 3.7 Sonnet（Extended Thinking）」の特徴は？",a:"Anthropicが2025年にリリース。回答前に数千トークン分の内部推論（思考）を実行し、複雑なコーディング・数学・科学問題で大幅な性能向上を実現した。"},
  {id:572,cat:"プロンプト",q:"「AIで競合分析をする」際の効果的なプロンプト設計は？",a:"競合各社の強み・弱み・市場ポジションを比較する表形式を指定し、分析対象（製品・価格・顧客層・強み）を明確にし、根拠となる情報ソースの提示も求める。"},
  {id:573,cat:"RAG・エージェント",q:"「Corrective RAG（CRAG）」とは何か？",a:"検索した文書の関連性をLLMで評価し、関連性が低いと判断した場合はウェブ検索にフォールバックする自己修正型RAGの手法。精度と信頼性を向上させる。"},
  {id:574,cat:"著作権・倫理",q:"「AIが生成した音楽のストリーミング収益」の著作権問題は？",a:"AI生成音楽が人気を得て収益を上げる場合、著作権がない（または不明確な）ため権利帰属が複雑。SpotifyなどのDSPもAI生成楽曲のポリシーを整備しつつある。"},
  {id:575,cat:"セキュリティ",q:"「AIのトークン乗っ取り（Token Smuggling）」攻撃とは何か？",a:"Unicodeの特殊文字・見えない文字・エンコーディングを使い、人間には読めないが AIトークナイザーには別の意味で解釈される悪意ある指示を入力に埋め込む攻撃。"},
  {id:576,cat:"法規制",q:"「AI事業者ガイドライン第1.1版の主な改訂内容（2025年3月）」は？",a:"①AIサービス利用者（エンドユーザー）への原則追加②不正利用・ハイリスク応用への対応強化③RAGやエージェント型AIに関する記述更新④AI新法の公布を踏まえた整合性確保。"},
  {id:577,cat:"データ保護",q:"「AIのデータガバナンス成熟度モデル」とは何か？",a:"組織のデータ管理能力を段階的に評価するフレームワーク。レベル1（初期・場当たり的）からレベル5（最適化・自動化）まで段階的に整備を進める指針として使われる。"},
  {id:578,cat:"AI基礎",q:"「AIリテラシーの4要素（GUGA定義）」とは？",a:"①AIの基本知識（仕組みと特性）②生成AIの活用スキル③リスク管理（セキュリティ・著作権・倫理）④法制度・ガバナンスの理解。生成AIパスポート試験の出題範囲を網羅する概念。"},
  {id:579,cat:"生成AI技術",q:"「LLMを使ったデータ抽出（Information Extraction）」の活用例は？",a:"非構造化テキスト（ニュース記事・契約書・医療記録）から特定の情報（日付・金額・固有名詞・条項）を構造化JSONなどの形式で自動抽出する業務自動化。"},
  {id:580,cat:"LLM",q:"「Long-form Content Generation（長文生成）」の品質を高めるテクニックは？",a:"①アウトライン先行生成→セクション別生成②前のセクションの要約を次のコンテキストに含める③一貫したトーン・スタイルガイドをシステムプロンプトで設定する。"},
  {id:581,cat:"最新モデル",q:"「xAI（Elon Musk）のGrok」の特徴は？",a:"xAI（イーロン・マスクが設立）が開発するLLM。Xプラットフォームのリアルタイムデータへのアクセス・ユーモアある回答スタイル・他モデルより制限が少ない点が特徴とされる。"},
  {id:582,cat:"プロンプト",q:"「AIに「なぜ」を聞かせるプロンプト」の効果は？",a:"単に「〜してください」ではなく「〜の理由を説明してください」「なぜこの結論になるか根拠を示してください」とすることで、推論の透明性が高まりハルシネーション検出がしやすくなる。"},
  {id:583,cat:"RAG・エージェント",q:"「エージェントのサンドボックス（Sandbox）」の重要性は？",a:"AIエージェントが実行するコードやツール操作を隔離された環境で実行し、本番システムや重要データへの意図しない影響を防ぐセキュリティ設計。"},
  {id:584,cat:"著作権・倫理",q:"「AI生成フェイクポルノグラフィー（NCII）」への法的対応は？",a:"英国・韓国・一部米国州などで非合意フェイク性的画像の作成・配布を犯罪化。日本でも不正競争防止法・プロバイダ責任制限法等での対応が議論されている。"},
  {id:585,cat:"セキュリティ",q:"「量子コンピュータとAIセキュリティ」の関係は？",a:"量子コンピュータの実用化が進むと現在の暗号（RSA・楕円曲線）が破られる可能性がある。AIが利用する暗号通信・学習データの保護のために量子耐性暗号への移行が必要になる。"},
  {id:586,cat:"法規制",q:"「AIとPDCA（計画・実行・評価・改善）の関係」はガバナンスでどう使われるか？",a:"AI利活用ガイドラインでは計画（リスク評価・方針策定）→実行（AIの展開）→評価（インシデント・性能監視）→改善（ガイドライン見直し）のPDCAサイクルを継続的に回すことが求められる。"},
  {id:587,cat:"データ保護",q:"「個人情報保護法の「オプトアウト規制」の強化」の内容は？",a:"2022年改正でオプトアウトによる第三者提供の範囲が縮小。要配慮個人情報・不正取得情報・他社からオプトアウトで取得した情報はオプトアウト提供不可となった。"},
  {id:588,cat:"AI基礎",q:"「AIの普及がもたらす雇用への影響」に関する主要な見解は？",a:"McKinsey・WEF等の調査では特定の反復作業は代替されるが、創造的・社会的・高度技術職は補完・強化される傾向。新しい職種の創出と既存職の変容が同時に起きるとされる。"},
  {id:589,cat:"生成AI技術",q:"「AIによるパーソナライゼーション」の仕組みと課題は？",a:"ユーザーの行動データをAIが学習して個別最適なコンテンツ・推薦・応答を提供。課題：フィルターバブル（偏った情報圏）・プライバシー侵害・操作的な使用の可能性。"},
  {id:590,cat:"LLM",q:"「LLMのMulti-turn（マルチターン）対話の管理」で注意すべき点は？",a:"コンテキストが長くなるとトークンコスト増・初期指示の忘却・前の発言との矛盾が起きやすくなる。定期的な要約・重要情報の明示的な繰り返しが品質維持に有効。"},
  {id:591,cat:"最新モデル",q:"「Perplexity Sonar API」の特徴は？",a:"PerplexityのRAGエンジンをAPIで提供するもの。リアルタイムウェブ検索＋LLM生成を組み合わせ、最新情報に基づく引用付き回答を生成できるAPI。"},
  {id:592,cat:"プロンプト",q:"「クリティカルシンキング（批判的思考）のプロンプト」への活用例は？",a:"「この計画の欠点を5つ挙げて」「反論を3つ挙げた後、それに対する反駁を示して」「悪魔の代弁者として反対意見を述べて」などのプロンプトで多角的思考を促す。"},
  {id:593,cat:"RAG・エージェント",q:"「AIエージェントのコスト管理」のベストプラクティスは？",a:"最大ステップ数・最大コスト上限の設定・安価な小モデルで計画、高性能モデルで重要ステップのみ処理するモデル混在戦略・キャッシュの活用・不要なツール呼び出しの削減。"},
  {id:594,cat:"著作権・倫理",q:"「AI倫理の「4つの原則（Belmont Report転用）」の内容は？",a:"①自律尊重（Respect for Autonomy）②善行（Beneficence）③無危害（Non-maleficence）④公正（Justice）。医療倫理の原則をAIに転用した枠組み。"},
  {id:595,cat:"セキュリティ",q:"「AIシステムの脅威モデリング（STRIDE）」のAIへの適用は？",a:"Spoofing（なりすまし）・Tampering（改竄）・Repudiation（否認）・Information Disclosure（情報漏洩）・DoS（サービス妨害）・Elevation of Privilege（権限昇格）をAIシステムで分析する。"},
  {id:596,cat:"法規制",q:"「AIの国家安全保障への影響」として主要国が懸念する点は？",a:"先端AIモデルの軍事転用・AI搭載の自律兵器・AIによる偵察・サイバー攻撃の高度化・AIの半導体・データセンターへの外国依存・AIを使った選挙干渉など。"},
  {id:597,cat:"データ保護",q:"「LDP（Local Differential Privacy）」とは何か？",a:"各ユーザーのデバイス上でノイズを加えてからデータを送信する差分プライバシーの変種。サーバー側では個人を識別できないため、プライバシーを保ちながら統計データを収集できる。"},
  {id:598,cat:"AI基礎",q:"「AIの「説明の公正性（Fairness Through Awareness）」とは何か？",a:"センシティブ属性（人種・性別）を認識した上でAIが公平な結果を出すよう設計するアプローチ。無意識に属性を使ったバイアスを持つ「公正性を通じた無意識」と対比される。"},
  {id:599,cat:"生成AI技術",q:"「マルチモーダルRAG」の実装でチャレンジとなる点は？",a:"テキスト・画像・表・グラフが混在するドキュメントのパース・各モダリティを統一ベクトル空間に埋め込む技術・検索時の異種メディア間の類似度計算の複雑さ。"},
  {id:600,cat:"LLM",q:"「LLM評価の「人間評価 vs 自動評価」のトレードオフ」は？",a:"人間評価：高品質・高コスト・スケールしにくい。自動評価（ベンチマーク・LLM-as-judge）：低コスト・スケーラブルだが人間の判断とずれることあり。両者の組み合わせが推奨される。"},

  // ===== MCP（Model Context Protocol）詳細 =====
  {id:601,cat:"RAG・エージェント",q:"MCP（Model Context Protocol）が公開されたのはいつ？発表した企業は？",a:"2024年11月。AnthropicがオープンスタンダードとしてリリースしたAIモデルと外部ツールを標準的に接続するためのプロトコル。"},
  {id:602,cat:"RAG・エージェント",q:"MCPの正式名称と略語の意味は？",a:"Model Context Protocol。Model（モデル）・Context（文脈）・Protocol（規約・通信規格）の略で、LLMと外部ツールを標準化された方法で接続する規格。"},
  {id:603,cat:"RAG・エージェント",q:"MCPアーキテクチャを構成する3つの主要コンポーネントは何か？",a:"①MCPホスト（LLMが動作するアプリ：Claude Desktop・Cursorなど）②MCPクライアント（ホスト内でサーバーとの通信を仲介）③MCPサーバー（外部ツール・DB・APIへの橋渡し役）"},
  {id:604,cat:"RAG・エージェント",q:"MCPホストの具体例を2つ挙げよ。",a:"Claude Desktop（Anthropicが提供するデスクトップアプリ）・Cursor（AIコードエディタ）。ともにMCPホストとして動作し、MCPサーバーを通じて外部ツールに接続できる。"},
  {id:605,cat:"RAG・エージェント",q:"MCPサーバーはどのような外部リソースに接続できるか？",a:"GitHub・Google Drive・Slack・データベース（PostgreSQL等）・Brave Search・各種REST API・ローカルファイルシステムなど、多様なデータソースやツールと連携できる。"},
  {id:606,cat:"RAG・エージェント",q:"MCPの通信フォーマットは何か？",a:"JSON-RPC 2.0。MCPホストとMCPサーバー間の通信はこの軽量なRPCプロトコルで標準化されており、ツール呼び出し・リソース取得・サンプリングリクエストを処理する。"},
  {id:607,cat:"RAG・エージェント",q:"MCPが「AI界のUSB-Cポート」と呼ばれる理由は？",a:"USB-Cが1種類のコネクタで様々なデバイスを接続できるように、MCPも統一規格でLLMとあらゆる外部ツール・データソースを接続できるから。異なるAIシステム間での再利用性が高い。"},
  {id:608,cat:"RAG・エージェント",q:"MCPとRAGの主な違いは何か？",a:"RAGは「知識の検索・参照（読む）」の仕組み。MCPは「外部ツールやシステムへの接続・実行（書く・操作する）」も含む広い枠組み。MCPを使ってRAGを実装することも可能。"},
  {id:609,cat:"RAG・エージェント",q:"MCPとAPIの違いは何か？",a:"APIは個別のサービスとの点対点接続。MCPはAIとツールをつなぐ標準化されたプロトコルで、一度MCPに対応すれば異なるAIシステムからも同様に利用できる汎用性がある。"},
  {id:610,cat:"RAG・エージェント",q:"MCPはオープンスタンダードとして広く採用されているか？",a:"はい。AnthropicがOSSとして公開し、OpenAIやGoogle DeepMindなど主要AI企業も採用を表明している業界標準プロトコルとなっている。"},
  {id:611,cat:"RAG・エージェント",q:"MCPがAIエージェントにとって重要な理由は何か？",a:"AIエージェントが自律的にタスクを実行するには外部ツール（検索・ファイル操作・API呼び出し等）が不可欠で、MCPがその接続を標準化・簡略化し、どのAIでもMCP対応ツールを即座に利用できるため。"},
  {id:612,cat:"RAG・エージェント",q:"MCPクライアントの役割は何か？",a:"MCPホスト（LLMアプリ）とMCPサーバーの間に位置し、LLMからのツール呼び出しリクエストをMCPサーバーへの通信に変換する仲介コンポーネント。"},
  {id:613,cat:"RAG・エージェント",q:"MCPのセキュリティ上の主な注意点は何か？",a:"MCPサーバーが悪意ある外部リソースに誘導される「プロンプトインジェクション」リスク・過剰な権限付与による意図しないデータアクセス・機密データの外部送信リスクへの対策が必要。"},
  {id:614,cat:"RAG・エージェント",q:"MCPを使ったRAG実装の仕組みを簡潔に説明せよ。",a:"MCPサーバーがベクトル検索機能（pgvector等）を持ち、LLMからの検索要求をMCPで受け取り結果を返す。MCPホスト上のLLMがその結果を元に回答を生成するRAGシステムとなる。"},
  {id:615,cat:"RAG・エージェント",q:"MCPが普及することでAIエコシステムにどのような変化が期待されるか？",a:"AIと外部ツールの接続コストが下がり、一度作ったMCPサーバーを複数のAIで再利用できるようになる。エージェント開発の標準化・加速が期待され、AIエコシステム全体の相互運用性が向上する。"},

  // ===== AI新法（法規制）追加 =====
  {id:616,cat:"法規制",q:"AI新法（人工知能関連技術の研究開発及び活用の推進に関する法律）の全面施行日はいつか？",a:"2025年9月1日。成立は2025年5月28日・公布は2025年6月4日。AI戦略本部の設置等を含む規定が全面施行された。"},
  {id:617,cat:"法規制",q:"AI新法において「研究機関・大学の役割」はどのように規定されているか？",a:"人工知能関連技術の研究開発を促進し、その成果を社会に還元するよう努めることが規定されている。産学官連携の推進もAI新法の重要な施策として位置づけられている。"},
  {id:618,cat:"法規制",q:"AI新法と日本の「AI戦略」の法的関係は？",a:"AI新法に基づきAI戦略本部（本部長は内閣総理大臣）が設置され、同本部がAI基本計画（国家AI戦略）を策定する法的根拠となる。AI新法は戦略立案から実施・評価の法的フレームを提供する。"},
  {id:619,cat:"法規制",q:"AI新法で「透明性の確保」が明文化された意義は何か？",a:"国民の権利利益が害される事態を防ぐため、AIの判断根拠の説明可能性・公開性を法的に要請するもの。AIを「経済社会の発展の基盤」と認めつつも、適切な制約の存在を示した。"},
  {id:620,cat:"法規制",q:"AI新法の制定に影響を与えた主な国際的動向は何か？",a:"EUのAI法（EU AI Act）の採択（2024年8月発効）・G7広島AIプロセスの進展・米国の大統領令など、主要国・地域でのAI規制・ガバナンス整備の動きが背景にある。"},
  {id:621,cat:"法規制",q:"AI新法においてAIリスク対応として事業者に求められる「透明性確保」の具体例は？",a:"AI利用の事実の開示・AIが生成したコンテンツへの表示・判断根拠の説明など。透明性はAI新法の核心原則の一つで、国民との信頼構築の基盤となる。"},

  // ===== AI事業者ガイドライン第1.1版詳細（法規制）=====
  {id:622,cat:"法規制",q:"AI事業者ガイドライン第1.1版でRAGやマルチモーダルAIに関して追加された主な内容は？",a:"生成AIによる便益・リスク・配慮事項として、テキストのみならず画像・音声を扱うマルチモーダル生成AI、RAG（検索拡張生成）、プログラムコード生成に関する記載が拡充された。"},
  {id:623,cat:"法規制",q:"AI事業者ガイドラインが「リビングドキュメント（Living Document）」として更新される理由は？",a:"AIをめぐる技術・国際的議論・リスクが急速に変化するため、アジャイル・ガバナンスの考え方に基づき、固定ルールではなく継続的に改訂される設計を採用しているから。"},
  {id:624,cat:"法規制",q:"EU AI法（EU AI Act）はどのような法律か？",a:"2024年8月に発効したEUの法的拘束力を持つAI規制法。AIをリスクに応じて分類し、高リスクAIには透明性・人間監督・適合性評価などの義務を課すハードロー。日本のAI新法（ソフトロー）とは対照的な規制アプローチ。"},
  {id:625,cat:"法規制",q:"AI事業者ガイドライン第1.1版の「AIガバナンス動向等の反映」として追記された国際的な内容の概要は？",a:"広島AIプロセスの国際行動規範の遵守状況を事業者が自ら確認し報告する仕組みの運用開始（2025年2月）、EU AI Act（2024年8月発効）などの国際動向の反映。"},
  {id:626,cat:"法規制",q:"AI事業者ガイドライン第1.1版での「AIリスクの洗い出し・分類」の改訂概要は？",a:"AIのリスクをより体系的に分類する枠組みが見直され、①提供者による悪用・誤用②利用者による誤使用③モデルの予期しない動作などのカテゴリでリスク対策を立案しやすくなった。"},
  {id:627,cat:"法規制",q:"AI事業者ガイドライン第1.1版における「AIの契約に関する留意事項」の主な内容は？",a:"AI開発・提供・利用の各段階での契約において、データの権利・成果物の著作権・モデルの改変可否・秘密保持・責任範囲を明確化することの重要性が示された。"},
  {id:628,cat:"法規制",q:"AI事業者ガイドライン第1.1版でAI利用者（エンドユーザー）向けに追加された主な内容は？",a:"利用者もAIリスクを適切に理解した上で利用し、出力の確認・修正・フィードバックなど人間の適切な関与（Human-in-the-loop）を維持することが求められる旨が追加された。"},

  // ===== RAG詳細（RAG・エージェント）=====
  {id:629,cat:"RAG・エージェント",q:"RAGが学術論文として初めて発表されたのはいつ？",a:"2020年。MetaのPatrick Lewisらによる「Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks」（NeurIPS 2020）で提案された。"},
  {id:630,cat:"RAG・エージェント",q:"「ナイーブRAG（Naive RAG）」の代表的な問題点は何か？",a:"チャンク分割の粗さによる文脈の切断・単純ベクトル検索のみによる低精度・取得文書の品質チェックなし・長いコンテキストでのLLMへの過剰入力など。精度向上のためアドバンスドRAGへの進化が必要。"},
  {id:631,cat:"RAG・エージェント",q:"「アドバンスドRAG（Advanced RAG）」ではナイーブRAGの何を改善するか？",a:"①Pre-retrieval最適化（クエリ書き換え・HyDE等）②より高精度なリトリーバル（ハイブリッド検索・リランキング）③Post-retrieval処理（コンテキスト圧縮・フィルタリング）の3段階で改善。"},
  {id:632,cat:"RAG・エージェント",q:"「モジュラーRAG（Modular RAG）」とは何か？",a:"検索・増強・生成の各コンポーネントを独立したモジュールとして組み合わせ可能にした柔軟なRAGアーキテクチャ。タスクに合わせてルーティング・反復・適応的な検索戦略が可能。"},
  {id:633,cat:"RAG・エージェント",q:"RAGのチャンク戦略で「固定サイズ」と「意味的分割（Semantic Chunking）」の違いは？",a:"固定サイズ：指定トークン数で機械的に分割。シンプルだが意味が途切れやすい。意味的分割：文章の意味的な境界（段落・見出し）で分割。コンテキストが保持されやすく検索精度が向上しやすい。"},
  {id:634,cat:"RAG・エージェント",q:"「スライディングウィンドウチャンキング」とは何か？",a:"チャンクに一定のオーバーラップ（重複部分）を設けながら固定サイズでスライドして分割する手法。チャンク境界での文脈の途切れを緩和できる。"},
  {id:635,cat:"RAG・エージェント",q:"RAGAS（RAG Evaluation Framework）とは何か？",a:"RAGシステムの品質を自動評価するOSSフレームワーク。Faithfulness・Answer Relevancy・Context Precision・Context Recallなどの指標で、RAGパイプラインの各コンポーネントを定量的に評価できる。"},
  {id:636,cat:"RAG・エージェント",q:"RAGASの4つの主な評価指標を説明せよ。",a:"①Faithfulness（回答が取得文書に忠実か）②Answer Relevancy（回答がクエリに関連するか）③Context Precision（検索文書に正確な情報があるか）④Context Recall（必要な情報を網羅できているか）"},
  {id:637,cat:"RAG・エージェント",q:"「HyDE（Hypothetical Document Embeddings）」とは何か？",a:"クエリに対して仮説的な回答文書をLLMで生成し、その仮説文書のベクトルで検索を行う手法。クエリ直接のベクトルより検索精度が向上することが多い。Pre-retrieval最適化の代表例。"},
  {id:638,cat:"RAG・エージェント",q:"「Step-back Prompting」がRAGに活用される場面は？",a:"具体的な質問をより抽象・一般的な質問に変換（ステップバック）してから検索することで、関連する背景知識を幅広く取得し回答品質を高める手法。"},
  {id:639,cat:"RAG・エージェント",q:"RAGで「メタデータフィルタリング」を活用する利点は？",a:"文書のカテゴリ・日付・部門・言語などのメタデータで検索対象を事前に絞り込むことで、ベクトル検索の精度と速度を向上させられる。日付範囲・部門指定などの組み合わせが効果的。"},
  {id:640,cat:"RAG・エージェント",q:"「コンテキスト圧縮（Contextual Compression）」とはRAGで何を意味するか？",a:"検索で取得した複数の文書からクエリに関連する部分だけを抽出・圧縮してLLMのコンテキストに渡す手法。不要な情報を排除し回答精度とトークン効率を改善する。"},
  {id:641,cat:"RAG・エージェント",q:"RAGにおける「LLM-as-judge」評価手法とは何か？",a:"LLM自身（または別の高性能LLM）を評価者として使い、生成された回答の品質・正確性・関連性を自動採点する方法。人手評価のコストを下げられる反面、評価LLMのバイアスへの注意が必要。"},
  {id:642,cat:"RAG・エージェント",q:"RAGにおける「クエリ拡張（Query Expansion）」とは何か？",a:"ユーザーの短いクエリを同義語・関連語・言い換えを加えて拡張し、より幅広い関連文書を検索できるようにする手法。検索漏れ（Recall低下）を防ぐ効果がある。"},
  {id:643,cat:"RAG・エージェント",q:"RAGのベクトルDBで使われる「ANN（近似最近傍検索）」の役割は？",a:"全文書との完全な距離計算は非効率なため、近似的に類似ベクトルを高速検索するANN（HNSW・IVFFlat等のインデックス）が使われる。速度と精度のトレードオフを設定可能。"},
  {id:644,cat:"RAG・エージェント",q:"RAGの評価でFaithfulnessが低い場合、何が問題か？",a:"LLMが取得した文書の内容を無視したり、文書にない情報を捏造（ハルシネーション）している状態。RAGを導入しても信頼できる出力にならないため、プロンプト設計や引用指示の強化が必要。"},
  {id:645,cat:"RAG・エージェント",q:"RAGにおける「Hybrid Search（ハイブリッド検索）」の実装例は？",a:"Dense Retrieval（ベクトル類似度）とSparse Retrieval（BM25等のキーワード一致）の両スコアをRRF（Reciprocal Rank Fusion）で統合する手法。固有名詞・商品名はキーワード検索が特に有効。"},
  {id:646,cat:"RAG・エージェント",q:"RAGの「インジェスト（前処理）フェーズ」で行われる処理は？",a:"文書の収集→テキスト抽出→チャンク分割→埋め込みベクトル生成→ベクトルDBへの格納。質問を受け取る前に完了する前処理フェーズで、RAGの品質はここで大きく決まる。"},

  // ===== AIエージェント詳細（RAG・エージェント）=====
  {id:647,cat:"RAG・エージェント",q:"AIエージェントの「タスク分解（Task Decomposition）」で使われる主な手法は？",a:"①CoT（Chain-of-Thought）でステップを言語化②ToT（Tree of Thoughts）で複数経路を探索③LLMへの「サブタスクに分解して」という指示④Plan-and-Execute（プランナーLLMが計画立案）などがある。"},
  {id:648,cat:"RAG・エージェント",q:"「マルチエージェントの協調パターン（Sequential・Parallel・Hierarchical）」の違いは？",a:"Sequential：エージェントが順番に処理を渡す直列型。Parallel：複数エージェントが同時に並列処理。Hierarchical：オーケストレーターが下位エージェントを管理・指示する階層構造。"},
  {id:649,cat:"RAG・エージェント",q:"AIエージェントの「Short-term Memory（短期記憶）」はどこに保持されるか？",a:"LLMのコンテキストウィンドウ（プロンプト内）。現在のタスクの状態・会話履歴・直近の観察結果がここに保持される。コンテキスト長を超えると情報が失われる。"},
  {id:650,cat:"RAG・エージェント",q:"AIエージェントの「Procedural Memory（手続き記憶）」とは何か？",a:"エージェントが習得した「スキル」「ワークフロー」などの手順的知識。通常はコードや外部ストレージに永続化され、再利用可能なツール・関数として実装される。"},
  {id:651,cat:"RAG・エージェント",q:"AIエージェントの「Structured Output（構造化出力）」を使う利点は？",a:"JSONなど構造化された形式でLLMに回答させることで、後続のコード・ツールが解析しやすくなりパース失敗のリスクを下げられる。OpenAI・AnthropicともAPI側で公式サポートしている。"},
  {id:652,cat:"RAG・エージェント",q:"エージェントの「Code Executor（コード実行環境）」で利用されるサンドボックスの例は？",a:"Docker・E2BのCodeInterpreterサービス・Jupyter Notebookなど。隔離環境でコードを実行し、ホストシステムへの影響を防ぐセキュリティ設計が重要。"},
  {id:653,cat:"RAG・エージェント",q:"「Reflexion（反省）アーキテクチャ」とはAIエージェントにおいてどのような仕組みか？",a:"エージェントが過去の行動・結果を評価・反省し、失敗から学習して次の試みを改善するループ。外部フィードバックを言語的メモリに変換して蓄積し、自己改善型の挙動を実現する。"},
  {id:654,cat:"RAG・エージェント",q:"マルチエージェントフレームワーク「Swarm（OpenAI）」の設計思想は何か？",a:"軽量で単純なエージェント群が「Handoff（引き継ぎ）」と「Routine（ルーチン）」の2概念で協調する設計。複雑なオーケストレーター不要でシンプルなマルチエージェントを実現する。"},
  {id:655,cat:"RAG・エージェント",q:"AIエージェントの「Tool Schema（ツールスキーマ）」とは何か？",a:"エージェントが使用できるツールの名前・説明・パラメータ定義をJSON Schema形式で記述したもの。LLMがいつどのツールを使うべきかを判断するための仕様書として機能する。"},
  {id:656,cat:"RAG・エージェント",q:"「ワークフロー型エージェント」と「自律型エージェント（Autonomous Agent）」の違いは？",a:"ワークフロー型：事前定義の手順に沿って処理する決定論的な設計。自律型：目標だけ与えられ、手順はエージェント自身がリアルタイムで計画・変更する動的設計。"},
  {id:657,cat:"RAG・エージェント",q:"「AIエージェントのコスト爆発（Cost Explosion）」の原因と対策は？",a:"原因：LLM呼び出し・ツール実行が無制限に繰り返されること。対策：最大ステップ数上限・コスト上限の設定・安価な小モデルでの計画と高性能モデルの重要ステップ限定使用・キャッシュ活用。"},
  {id:658,cat:"RAG・エージェント",q:"「Human-in-the-loop」のAIエージェントへの実装方法は？",a:"重要アクション（外部送信・ファイル削除・支払い処理等）の前に人間の承認を必須にする「チェックポイント」設計。LangGraphのinterrupt機能や専用UIが活用される。"},
  {id:659,cat:"RAG・エージェント",q:"「エージェントのペルソナ・システムプロンプト」の設計が重要な理由は？",a:"システムプロンプトがエージェントの行動原則・役割・制約・使用ツールを規定する。適切な設計がエージェントの一貫性・安全性・タスク精度に直結する。"},
  {id:660,cat:"RAG・エージェント",q:"AIエージェントの「エラー処理（Error Handling）」のベストプラクティスは？",a:"①ツール失敗時の再試行ロジック（指数バックオフ）②エラーメッセージをエージェントにフィードバックして再計画③致命的エラーでの安全停止④ログ記録による後追い分析の組み合わせ。"},
  {id:661,cat:"RAG・エージェント",q:"「エージェントの入力バリデーション（検証）」が必要な理由は？",a:"悪意あるユーザーが不正な入力でエージェントを操作するプロンプトインジェクション攻撃を防ぐため。ユーザー入力はサニタイズし、危険な指示を検出・拒否する設計が重要。"},
  {id:662,cat:"RAG・エージェント",q:"「OpenAI Function Calling」と「Anthropic Tool Use」の共通設計と違いは？",a:"共通：ツールスキーマをJSONで定義しLLMがツール名・引数をJSON形式で生成する基本構造。違い：Claudeは「tool_use」メッセージ形式、OpenAIは「function」/「tool」形式を使用。"},
  {id:663,cat:"RAG・エージェント",q:"「エージェントのContext Window Management（コンテキスト管理）」の課題と対策は？",a:"課題：長い会話履歴・ツール実行結果がコンテキストウィンドウを圧迫すること。対策：重要情報の要約・選択的保持・外部メモリへの退避・最近のやり取りのみ保持する戦略。"},

  // ===== 最新モデル追加（最新モデル）=====
  {id:664,cat:"最新モデル",q:"GPT-5のハルシネーション低減に関する特徴は？",a:"OpenAIによると、GPT-5はGPT-4o比で約45%・o3比で約80%のハルシネーション低減を達成。「日常即答型」と「推論型」を1つのモデルに統合した設計が信頼性向上に貢献している。"},
  {id:665,cat:"最新モデル",q:"GPT-4.1の最大コンテキストウィンドウはどのくらいか？",a:"100万トークン（1Mトークン）。書籍全体やコードリポジトリを丸ごと処理でき、大規模コードベース分析や超長文ドキュメント処理に強みを持つ。"},
  {id:666,cat:"最新モデル",q:"OpenAIのoシリーズが採用した「Deliberative Alignment（熟慮的整合性）」とは何か？",a:"回答を即時生成するのではなく、安全方針を内部推論プロセスで吟味・適用してから回答を出す手法。思考プロセス自体の一貫性と安全性を高めるoシリーズ固有のアプローチ。"},
  {id:667,cat:"最新モデル",q:"GPT-o3が発表されたのはいつか？その特徴は？",a:"2024年12月。OpenAIが発表した推論特化モデルで、数学・競技プログラミング・博士課程レベルの科学問題でo1を大幅に上回る性能を示した。"},
  {id:668,cat:"最新モデル",q:"Gemini 2.5 Proの主な特徴は？",a:"Googleが2025年にリリースしたGeminiの最先端推論モデル。高度な推論・コーディング能力・超長コンテキスト対応を持ち、複数のベンチマークでトップレベルの性能を示している。"},
  {id:669,cat:"最新モデル",q:"GPT-5に「日常即答型と推論型の統合」が実現された意義は？",a:"これまでGPT-4oシリーズ（即答型）とoシリーズ（推論型）に分かれていた2つの能力を1モデルに統合。用途に応じて自動的に適切なモードで動作し、一つのモデルで幅広いタスクに対応できる。"},
  {id:670,cat:"最新モデル",q:"「o4-mini-high」が注目される主な理由は？",a:"コスト効率の高いo4-miniの高精度版で、ブラウザ操作・コード実行・ファイル処理など多様なツールとの連携が可能。コストを抑えながら「考えながら行動できるAI」として実用的。"},
  {id:671,cat:"最新モデル",q:"Gemini 2.0 Flashの主な特徴は？",a:"GoogleのGemini 2世代の高速・低コストモデル。テキスト・画像・音声・動画のマルチモーダル入力に対応し、ネイティブ画像生成と音声出力も可能。高速レスポンスを維持しながら高い性能を実現。"},
  {id:672,cat:"最新モデル",q:"「Anthropicのプロンプトキャッシング（Prompt Caching）」の効果は？",a:"同じシステムプロンプトや長いコンテキストを繰り返し使う場合に、キャッシュされた部分のトークン処理コストを大幅削減（最大90%削減）できる機能。長いRAGコンテキストでも効果的。"},
  {id:673,cat:"最新モデル",q:"LLMの「量子化（Quantization）」はどのような効果があるか？",a:"モデルのパラメータのビット数を削減（FP32→FP16→INT8→INT4等）することでモデルサイズを縮小し、推論速度向上・メモリ削減・ローカル実行を可能にする。精度は若干低下することがある。"},
  {id:674,cat:"最新モデル",q:"「LLMの知識蒸留（Knowledge Distillation）」とは何か？",a:"大きな高性能モデル（教師モデル）の知識を小さなモデル（生徒モデル）に転移させる手法。生徒モデルは教師の出力確率分布を学習し、サイズ比で高い性能を達成できる。"},
  {id:675,cat:"最新モデル",q:"「GPT-4.5」の特徴はGPT-4oとどう異なるか？",a:"GPT-4.5はEmotional Intelligence（感情的知性）・会話の自然さ・ハルシネーション低減に重点を置いた実験的大型モデル。oシリーズほど数学・コーディング強化ではなく、会話品質を重視した設計。"},

  // ===== 動画生成AI詳細（生成AI技術）=====
  {id:676,cat:"生成AI技術",q:"動画生成AIにおける「自己回帰モデル（Autoregressive Model）」はどのように動画を生成するか？",a:"テキストトークンと同様に動画を一連のトークン列として扱い、前のフレームに基づいて次のフレームを逐次予測・生成する方式。時系列の一貫性に優れる。"},
  {id:677,cat:"生成AI技術",q:"動画生成AIで「拡散モデル」と「自己回帰モデル」の特徴の違いは？",a:"拡散モデル：ノイズから段階的にデノイズして動画を生成。高品質だが生成に時間がかかる。自己回帰モデル：前フレームから次フレームを予測する逐次生成。時間的一貫性が確保しやすい。2026年シラバスで両方の理解が求められる。"},
  {id:678,cat:"生成AI技術",q:"Veo3の「音声同時生成」機能はどのような革新をもたらしたか？",a:"これまでの動画生成AIは映像のみ生成し別途音声合成が必要だったが、Veo3はテキストプロンプトから映像と音声（対話・効果音・BGM等）を同時に生成できる。コンテンツ制作を大幅に効率化する。"},
  {id:679,cat:"生成AI技術",q:"GoogleのVeoシリーズの進化の概要を説明せよ。",a:"Veo（2024年）：高品質な動画生成の初代モデル。Veo 2：品質・長さ・一貫性を改善。Veo 3（2025年）：音声同時生成が追加され、映像と音声を統合したマルチモーダル動画生成が可能になった。"},
  {id:680,cat:"生成AI技術",q:"動画生成AIの「テンポラル一貫性（Temporal Consistency）」とは何か？",a:"動画内でオブジェクトの外観・色・形状・物理挙動がフレーム間で一致することが必要な特性。不一致があると「ちらつき」や「物体の外観が変化する」不自然な映像になってしまう。"},
  {id:681,cat:"生成AI技術",q:"動画生成AIの主なビジネス活用例を3つ挙げよ。",a:"①広告・マーケティング（商品動画の自動生成）②教育コンテンツ（説明動画・シミュレーション映像）③映像制作（プロトタイプ・絵コンテの映像化）。映画・ゲーム・メディア分野への応用も拡大中。"},
  {id:682,cat:"生成AI技術",q:"「ディープフェイク動画」の主な検出技術は？",a:"①顔の不自然な境界・光の反射の解析②目のまばたき・口の動きの不自然さの検出③メタデータ・圧縮アーティファクト分析④AI生成コンテンツの電子透かし（C2PA規格等）の確認。"},
  {id:683,cat:"生成AI技術",q:"動画生成AIの「テキストtoビデオ（T2V）」と「画像toビデオ（I2V）」の違いは？",a:"T2V：テキストプロンプトのみから動画を生成。I2V：静止画像を入力として動きを加えて動画化する。I2VはT2Vより内容の一貫性を保ちやすく、既存素材の活用に適する。"},
  {id:684,cat:"生成AI技術",q:"動画生成AIの「ディープフェイク」以外の主なリスクは何か？",a:"①著作権・肖像権侵害（実在映像の無断学習）②映像制作職への影響③CSAM（児童性的虐待素材）生成への悪用リスク④プロパガンダ動画の大量生成⑤偽証拠映像の作成。"},
  {id:685,cat:"生成AI技術",q:"「動画インペインティング（Video Inpainting）」とは何か？",a:"動画内の特定領域（人物・物体・テキスト等）を除去し、その部分を周囲の映像と自然につながるように再生成する技術。不要な被写体の除去や動画修復に活用される。"},

  // ===== AI技術・補完（各カテゴリ）=====
  {id:686,cat:"LLM",q:"「SLM（Small Language Model）」の特徴と主な活用シーンは？",a:"Phi・Gemma・Llama Smallなど、数B〜十数Bパラメータの小型LLM。特徴：①オンデバイス実行可能②低コスト推論③プライバシー保護（外部送信不要）。活用：スマートフォン・IoT・エッジ環境でのAI処理。"},
  {id:687,cat:"AI基礎",q:"「AI PC」と「NPU（Neural Processing Unit）」とは何か？",a:"AI PC：NPUを搭載しAI処理をローカルで高速実行できるPC。NPU：AIのニューラルネットワーク演算に特化したチップで、GPU/CPUより低消費電力でAI推論を高速化。MicrosoftのCopilot+ PC要件として普及。"},
  {id:688,cat:"最新モデル",q:"「Model Merging（モデルマージ）」とは何か？",a:"複数の異なるタスク向けにファインチューニングされたモデルの重みを算術的に統合し、各モデルの特長を兼ね備えた新しいモデルを作る手法。追加学習なしでモデル能力を融合できる。"},
  {id:689,cat:"プロンプト",q:"「プロンプトエンジニアリング」と「ファインチューニング」の使い分け基準は？",a:"プロンプトエンジニアリング：データなし・低コストで試せる第一選択。ファインチューニング：大量のタスク固有データあり・プロンプトで対応困難な場合・高頻度利用でコスト効率が重要な場合に有効。"},
  {id:690,cat:"LLM",q:"「ベンチマーク汚染（Benchmark Contamination）」とは何か？",a:"LLMの評価に使われるベンチマーク問題が訓練データに含まれており、実力を過大評価してしまう問題。モデルが「答えを暗記している」だけの可能性があるため、新しいベンチマークの重要性が増している。"},
  {id:691,cat:"セキュリティ",q:"「直接型」と「間接型」プロンプトインジェクションの違いは？",a:"直接型：ユーザーが直接LLMへの悪意ある指示をプロンプトに挿入。間接型：RAGが参照する外部文書やウェブサイトに埋め込まれた悪意ある指示がLLMに取り込まれる形態（コンテキスト汚染とも呼ぶ）。"},
  {id:692,cat:"セキュリティ",q:"「マルチモーダルジェイルブレイク（Multimodal Jailbreak）」とは何か？",a:"テキストプロンプトへのフィルタリングを回避するため、有害な指示を画像・音声に埋め込んでマルチモーダルAIに入力する攻撃。視覚的なステガノグラフィや光学文字認識の悪用も含む。"},
  {id:693,cat:"AI基礎",q:"「AI Safety（AI安全性）」と「AI Alignment（AI整合性）」の違いは？",a:"AI Safety：AIシステムが誤動作・バグ・攻撃によって意図しない害をもたらさないようにする広義の安全設計。AI Alignment：AIが人間の意図・価値観・目標に沿って行動するよう設計・調整すること。整合性はSafetyの核心的な課題。"},
  {id:694,cat:"LLM",q:"「RoPE（Rotary Position Embedding）」とは何か？",a:"Transformerの位置エンコーディング手法の一つ。回転行列を使ってトークンの相対位置情報を表現し、長いコンテキストへの外挿性能が高い。LLaMA・Gemma・GPT-NeoXなど多数のモデルに採用されている。"},
  {id:695,cat:"著作権・倫理",q:"「AIの民主化」と「AI寡占化」のジレンマとは何か？",a:"AIの普及（民主化）はイノベーション・社会的価値を生むが、計算資源・データ・人材が一部の大企業（ビッグテック）に集中し寡占が進む逆説。オープンソースモデルの普及がこの緊張を緩和する試みの一つ。"},
  {id:696,cat:"プロンプト",q:"「Zero-shot CoT（ゼロショット思考連鎖）」とは何か？",a:"「Let's think step by step（ステップバイステップで考えよう）」という一文をプロンプトに加えるだけで、LLMが思考過程を自動的に展開して推論精度が向上する手法（Kojima et al. 2022）。Few-shot例不要。"},
  {id:697,cat:"ディープラーニング",q:"「Catastrophic Forgetting（壊滅的忘却）」とは何か？",a:"ニューラルネットワークが新しいタスクを学習すると、以前学習したタスクの性能が急激に低下する現象。継続学習（Continual Learning）の主要課題で、EWC（Elastic Weight Consolidation）などで緩和できる。"},
  {id:698,cat:"プロンプト",q:"「Tree of Thoughts（ToT）」プロンプティングとはどのような手法か？",a:"問題解決の途中状態を「思考の木（ツリー）」として表現し、各分岐点でLLMが複数の次の一手を生成・評価・選択しながら探索する手法。複雑な計画・推論タスクでCoTより高い性能を発揮することがある。"},
  {id:699,cat:"法規制",q:"企業が「AIポリシー（AI Use Policy）」を整備すべき理由と主な記載内容は？",a:"理由：シャドーAI防止・情報漏洩リスク管理・従業員の適切なAI利用促進・コンプライアンス確保。主な記載：利用許可・禁止AIツール・禁止情報の入力制限・生成物の確認義務・著作権・責任の帰属。"},
  {id:700,cat:"生成AI技術",q:"「音楽生成AI」の代表例と著作権上の課題は？",a:"Suno・Udio・MusicGen（Meta）などが代表例。課題：学習データへの著作権侵害の可能性・生成楽曲の著作権帰属（AI生成物か人間の創作か）・類似する既存楽曲との侵害問題など。"},
  {id:701,cat:"生成AI技術",q:"Vision-Language Model（VLM）とは何か？2025年の代表例を挙げよ。",a:"VLMは画像と自然言語を同時に理解・処理できるAIモデル。代表例：Claude 3（Vision対応）・GPT-4V・Gemini Pro Vision・LLaVA・DINO。用途：画像解析・OCR・図表理解・ビジュアルQA・チャートの自動説明。",y:"えーあい びじょん らんぐえーじ もでる あいえむ がぞう げんご ひょうげん"},
  {id:702,cat:"生成AI技術",q:"Claude 3のVision機能（画像認識）の主な用途と制限事項は？",a:"用途：スクリーンショット解析・書類OCR・グラフ・チャート・写真の説明・図解の理解・医療画像の補助診断。制限：顔認識の使用禁止・セキュリティ上の制約・解像度による精度変動・リアルタイム動画は未対応。",y:"くろーど びじょん きのう がぞう にんしき ようと せいげん"},
  {id:703,cat:"最新モデル",q:"「Unified Vision-Language Model」と「Separate Encoders」の違いは？",a:"統一型：画像と言語を同一ニューラル空間で処理し、低遅延・パラメータ効率良好（Flamingo・BLIP）。分離型：別々のエンコーダで処理し、各モダリティに最適化（CLIP・ALIGN）。用途と学習データで使い分け。",y:"としいつがたりようご ぶんりがた えんこーだ ちがい"},
  {id:704,cat:"プロンプト",q:"Vision-Language Modelへの画像クエリで、より正確な回答を得るプロンプト技法は？",a:"「Image Captioning First」：まず画像の詳細説明をさせてから質問する。「Region-based」：特定領域を明示する。「Context Injection」：背景情報を追加。「Task-specific Format」：タスクに応じた回答形式を指示。",y:"がぞう くえりー せいかくな かいとう ぷろんぷと ぎほう"},
  {id:705,cat:"生成AI技術",q:"動画解析AI（Video Understanding AI）の現状と2025年の課題は？",a:"現状：Runway・Pika・Sora等が動画生成に対応。課題：長動画処理・リアルタイム処理・3D一貫性・動作予測の精度・著作権・深偽防止・計算コスト。継続学習により改善中。",y:"どうが かいせき げんじょう にせんにじゅうごねん かだい"},
  {id:706,cat:"ディープラーニング",q:"トランスフォーマーのAttention機構をマルチモーダル環境で応用する際のポイントは？",a:"異なるモダリティ（画像・テキスト）の表現を同じベクトル空間に射影し、Cross-Attention で相互作用させる。各モダリティで異なるトークン化手法を使用。画像はパッチ分割で対応。",y:"とらんすふぉーまー あてんしょん きこう まるちもーだる かんきょう"},
  {id:707,cat:"RAG・エージェント",q:"マルチモーダルRAG（Retrieval-Augmented Generation）の実装上の工夫は？",a:"画像とテキストを別々のインデックスで管理し、クエリに応じて最適な検索モダリティを選択。CLIP や似度学習で画像とテキストを共通空間にマッピング。再取得時に異なるモダリティを融合。",y:"まるちもーだる らぐ じっそう こうふう"},
  {id:708,cat:"生成AI技術",q:"「Visual Question Answering（VQA）」の精度向上に有効な手法（2025年）は？",a:"Scene Graphs構造を活用した関係性理解・Prompt-based few-shot学習・Vision-Language事前学習モデルのFine-tuning・外部知識ベースとの統合・Ensemble方式の複数モデル活用。",y:"びじゅある くえすちょん あんさーりんぐ せいど こうじょう"},
  {id:709,cat:"最新モデル",q:"Googleの「Gemini 2.0 Flash」がマルチモーダル処理で突出している理由は？",a:"軽量化により低遅延を実現・視覚的推論性能の向上・リアルタイム会話での画像処理対応・統合エンコーディング・キャッシング機構による効率化。競争力：速度・精度・コスト のバランス。",y:"じぇみにに ふらっしゅ まるちもーだる しょり"},
  {id:710,cat:"セキュリティ",q:"Vision-Language Modelへの「Adversarial Attack（敵対的攻撃）」と対策は？",a:"画像に見えない摂動を加えて誤認識を誘発。対策：Adversarial Training・Input Sanitization・Robust Loss Functions・Certified Defenses・Red Teaming。医療AI・自動運転での重要課題。",y:"せおーりてぃ あたっく たいさく"},
  {id:711,cat:"著作権・倫理",q:"VLMが学習データから学んだ画像スタイル再現時の著作権問題は？",a:"学習画像のスタイルを模倣した出力が著作権侵害に該当するか未定。業界では：①学習画像の帰属表示・②オプトアウト機構・③Fair Use判断・④業界ガイドラインで対応中。EU AI Act等で規制予定。",y:"ちょさくけん りんり もんだい"},
  {id:712,cat:"データ保護",q:"VLMに画像を入力する際の個人情報保護の注意点は？",a:"顔・ナンバープレート・ID番号・プライベート情報を含む画像の入力禁止。多くのサービスで処理後削除を標準化。ただし長期保存・モデル改善用の学習データ化の可能性を警戒。企業ポリシーで明文化。",y:"でーた ほご がぞう こじん じょうほう"},
  {id:713,cat:"生成AI技術",q:"テキストと画像の「Modality Gap（モダリティギャップ）」とは何か？",a:"テキスト表現と画像表現が異なる特徴空間にあり、直接比較困難な問題。対策：共通の埋め込み空間への射影（CLIP）・Contrastive Learning・Fusion Mechanisms。埋め込み空間の整列が精度向上のカギ。",y:"てきすと がぞう もーだりてぃ ぎゃっぷ"},
  {id:714,cat:"LLM",q:"Large Vision-Language Model（LVLM）をエッジデバイスで動かす際の課題は？",a:"計算量・メモリ削減・レイテンシ。解決策：モデル圧縮（量子化・蒸留）・アテンション最適化・キャッシング・分散推論・Speculative Decoding。MobileViT等の軽量VLM開発が進行中。",y:"えっじ でばいす どうが かだい"},
  {id:715,cat:"プロンプト",q:"VLMの画像解析結果をプロンプトに組み込む「Chaining」パターンは？",a:"①Image → Description ②Description → Analysis ③Analysis → Insight の3段階。または動的に：画像に基づいて次の質問を自動生成し、推論を深掘り。Chain-of-Thought と視覚情報の組み合わせで推論性能向上。",y:"がぞう かいせき けっか ちぇいにんぐ ぱたーん"},
  {id:716,cat:"生成AI技術",q:"Stable Diffusionなど画像生成AIで「トーンや表情」を正確に制御する手法は？",a:"ControlNet・T2I Adapters・In-painting など条件付きコントロール・テキストプロンプトの詳細化・Negative Prompts活用・Guidance Scale調整・複数生成と選別。細粒度制御が2025年の課題。",y:"がぞう せいせい あい とーん ひょうじょう せいぎょ"},
  {id:717,cat:"RAG・エージェント",q:"マルチモーダルエージェントで「画像認識 → テキスト生成 → 行動決定」の流れを実装する際の課題は？",a:"モダリティ間の遅延・エラー伝播・コンテキスト喪失・計算コスト。対策：並列処理・Fallback機構・メモリバッファ・マルチラウンド確認。自動運転・ロボットで実装例あり。",y:"まるちもーだる えーじぇんと りゅう じっそう"},
  {id:718,cat:"最新モデル",q:"OpenAIの「GPT-4o」（omni）が従来のVLMと異なる点は？",a:"マルチモーダル統合度の向上・リアルタイム音声・動画対応・推論速度向上・API統一化。従来型VLMはテキスト+画像が主流。omniはテキスト・画像・音声・動画を等価に処理。",y:"じーぴーてぃーよんおー おむに びえるえむ こととなる"},
  {id:719,cat:"法規制",q:"VLMが医療・金融分野で使用される際の規制要件（EU AI Act対応）は？",a:"High-Risk分類：基礎モデル使用時は透明性・説明責任・ユーザー同意義務。医療診断への直接使用禁止（補助のみ）。偏り・差別検査必須。スキャン監査ログ・レポート保管。非遵守で巨額罰金。",y:"えーあい あくと いりょう きんゆう きせい"},
  {id:720,cat:"セキュリティ",q:"VLMの推論過程で「情報漏洩」や「Prompt Injection」が起こるメカニズムは？",a:"①メタデータ抽出：画像のEXIF・埋め込みメタ ②隠れテキスト認識：AIが検出可能な見えないテキスト ③プロンプトインジェクション：悪意ある指示の埋め込み。対策：サニタイズ・Input Validation・Rate Limiting。",y:"すいろん かてい じょうほう ろうえい ぷろんぷと いんじぇくしょん"},
  {id:721,cat:"AI基礎",q:"SLM（Small Language Model）の定義と応用シーンは？",a:"パラメータ数が3B～7Bの言語モデル。スマートフォン・IoT・エッジデバイスで動作。Meta Llama 2 7B、Google Gemma 7B等。低レイテンシ・消費電力少・プライバシー重視で注目。2025年はSLM時代へシフト。",y:"えす える えむ しょうきぼ げんご もでる"},
  {id:722,cat:"ディープラーニング",q:"Vision Transformers（ViT）の進展と画像処理への応用は？",a:"CNN代替として注目。複数解像度・マルチスケール対応が進化。DeiT、DINO等の自己教師あり学習で精度向上。エッジデバイス向け軽量化モデル研究も進行。医療診断・工業検査等での実装例増加。",y:"びじょん とらんすふぉーまー がぞう しょり"},
  {id:723,cat:"生成AI技術",q:"Diffusion Model の「Latent Diffusion」と「Consistency Model」の違いは？",a:"Latent Diffusion：潜在空間で拡散。計算量削減・高品質生成を実現。Consistency Model：一段階で直接デノイジング。生成速度飛躍的に向上。2025年は高速生成が主流化予測。",y:"ふゅーじょん もでる りーてんと ち でのいじんぐ"},
  {id:724,cat:"LLM",q:"Mixture of Experts（MoE）アーキテクチャの仕組みと利点は？",a:"複数の小規模なエキスパートニューラルネットワークと、それを切り替えるゲーティングネットワーク。入力に応じて必要なエキスパートだけ起動。計算効率向上・スケーリング向上。Google Gemini等で採用。",y:"みっくすちゅあ おぶ えきすぱーつ もぇ こうぞう"},
  {id:725,cat:"最新モデル",q:"Google Geminiの「Gemini 2.0」と従来版の主な差分は？",a:"マルチモーダル統合度向上・リアルタイム処理・長文対応強化（100万トークン以上）・日本語精度向上・API統一化・推論速度改善。エンタープライズ向けの安定性も強化。",y:"ぐーぐる じぇみにに えーぴーあい こうのうりょく"},
  {id:726,cat:"プロンプト",q:"「Chain-of-Density」プロンプティング手法とは？",a:"複数段階で逐次的に情報を要約・抽出・要点化。①短い要約 ②詳細要約 ③最終要約のステップを踏む。テキスト圧縮・情報抽出・知識蒸留で有効。LLMの推論精度を向上させる手法。",y:"ちぇいん おぶ でんしてぃ ぷろんぷと ぎじゅつ"},
  {id:727,cat:"RAG・エージェント",q:"Agentic RAG（エージェント型RAG）の実装パターンは？",a:"①Query → ②Multi-hop Search → ③Query Refinement → ④Adaptive Retrieval。検索の判断を自動化。従来型は静的取得だが、エージェント型は動的・反復的。Dify等の統合プラットフォームで実装容易化。",y:"えーじぇんてぃっく らぐ ふくしゅう さがしもの"},
  {id:728,cat:"著作権・倫理",q:"2025年のAI著作権訴訟（New York Times vs OpenAI等）の動向は？",a:"①出版社側：学習データのライセンス問題主張 ②AI企業側：Fair Use抗弁。欧州AI Act・日本著作権改正で「データ提供者の権利」議論が深化。企業ガイドライン・ライセンス体系の標準化が進行中。",y:"ちょさくけん そしょう たいむず おーぷんえーあい"},
  {id:729,cat:"セキュリティ",q:"LLMに対する「Prompt Injection 攻撃」の防御策は？",a:"①Input Validation・サニタイズ ②System Prompt の厳格分離 ③Adversarial Testing ④Rate Limiting ⑤ユーザー権限制御 ⑥出力フィルタリング。多層防御が必須。",y:"ぷろんぷと いんじぇくしょん ぼうぎょ さいばー"},
  {id:730,cat:"法規制",q:"EU AI Act の「High-Risk」分類に該当するAI応用は？",a:"生体認証・就職採用・信用判定・医療診断補助・自動運転等。透明性・説明責任・人間監督・ユーザー同意が義務。非遵守は巨額罰金（売上15%以下で最大）。",y:"えー あい あくと はいりすく ぶんるい"},
  {id:731,cat:"データ保護",q:"GDPR対応のAI学習データ管理ポリシーとは？",a:"個人データ特定排除・匿名化・データミニマイズ・保存期間制限・アクセス権制御・監査ログ記録。企業側がデータ提供者に「学習用途」を明示。違反時は多額罰金（全売上4%等）。",y:"じーでぃーぴーあーる こうじゅんきょ でーた"},
  {id:732,cat:"AI基礎",q:"Tokenization の最新手法（Byte Pair Encoding vs SentencePiece）は？",a:"BPE：文字列を段階的に統合。言語依存性あり。SentencePiece：確率モデルで最適化。言語非依存・多言語対応優位。現在は SentencePiece が主流。日本語多言語対応では SPM が効果的。",y:"ときないぜーしょん えんこーでぃんぐ ぎじゅつ"},
  {id:733,cat:"ディープラーニング",q:"Flash Attention と Sparse Attention の効率性比較は？",a:"Flash Attention：I/Oボトルネック削減、GPU メモリ効率80%改善。Sparse Attention：計算量を O(n²) → O(n log n) に削減。長文処理では Sparse の方が優位。両技術の融合研究も進行中。",y:"ふらっしゅ あてんしょん まばら こうりつ"},
  {id:734,cat:"生成AI技術",q:"LLMの推論最適化「Speculative Decoding」の仕組みは？",a:"①小規模なドラフトモデルが複数トークン予測 ②大規模モデルで検証 ③不一致時は早期終了。推論スループット2～3倍改善。OpenAI・Google等が導入中。エッジAIでの活用期待大。",y:"すぺきゅれてぃぶ でこーでぃんぐ さいろん"},
  {id:735,cat:"LLM",q:"Long Context 対応モデル（100万トークン以上）の課題は？",a:"①メモリ消費量激増 ②計算時間増大 ③検索精度低下（Needle in Haystack）。対策：ALiBi（相対位置エンコーディング）・Rotary PE・Sparse Attention等。2025年標準化予想。",y:"ろんぐ こんてきすと たいおう もでる"},
  {id:736,cat:"最新モデル",q:"Meta の \"Code Llama 2\" と \"Llama 3\" のコード生成能力の違いは？",a:"Code Llama 2：プログラミング特化。複数言語対応・コード補完・検索最適化。Llama 3：一般能力重視だが、Fine-tuningでコード性能向上。両者の長所を融合するハイブリッド手法も研究中。",y:"こーど らま おーぷんそーす ぷろぐらみんぐ"},
  {id:737,cat:"プロンプト",q:"「Retrieval Augmented Generation」のプロンプト設計のベストプラクティスは？",a:"①Context 明示化：「以下の資料から回答」②Chain-of-Thought 統合③検索結果の信頼度表示④出力フォーマット指定。RAGの精度は50%がプロンプト、50%が検索品質。",y:"あうぐめんてっど げねれーしょん ぷろんぷと せっけい"},
  {id:738,cat:"RAG・エージェント",q:"エージェントの「Tool Use」と従来のAPI呼び出しの違いは？",a:"Tool Use：LLM自身が何を呼ぶかを判断。Tool Calling Format（JSON等）で指定。スケーラビリティ・汎用性に優位。従来API直連結よりも柔軟性・信頼性向上。OpenAI Function Call等で標準化。",y:"つーる ゆーず えーぴーあい さいよう"},
  {id:739,cat:"セキュリティ",q:"LLM出力の「Jailbreak 攻撃」の具体例と対策は？",a:"攻撃例：DAN（Do Anything Now）・ロールプレイ誘導。対策：①System Prompt 強化②Moderation API ③Adversarial Training ④出力フィルタリング⑤ユーザー教育。多層防御が必須。",y:"じぇいるぶれいく こうげき たいさく ぼうぎょ"},
  {id:740,cat:"法規制",q:"日本の「生成AI利用ガイドライン」（2024～2026更新版）の要点は？",a:"①著作権侵害リスク通知②業界別実装ガイド③責任分界点明確化④透明性・説明責任要求⑤個人情報保護対応。企業責任強化・個人ユーザー保護が焦点。改正スケジュール：2026年上期に更新予定。",y:"せいせい あい がいどらいん にほん りよう"},
  {id:741,cat:"ディープラーニング",q:"LoRA（Low-Rank Adaptation）と QLoRA の効率性の違いは？",a:"LoRA：低ランク行列を追加、パラメータ削減。QLoRA：LoRA+量子化で学習メモリ最大90%削減。大規模モデルのFine-tuning を手軽に。Google Colab 等でも実行可能。2025年のデファクト標準。",y:"ろーら きゅーろーら ふぁいんちゅーにんぐ"},
  {id:742,cat:"生成AI技術",q:"Model Merging（モデル統合）とは何か？TIES-Merging の仕組みは？",a:"複数の Fine-tuned モデルを統合し、一つの汎用モデルを生成。TIES-Merging：重みの衝突を検出し、信頼度ベースで統合。計算コスト削減・能力融合が実現。",y:"もでる またはしんぐ たいず まーじんぐ"},
  {id:743,cat:"LLM",q:"Graph Neural Networks（GNN）と LLM を統合したアーキテクチャの応用は？",a:"構造化データ・ナレッジグラフ・ソーシャルネットワーク分析で活躍。GNN で関係性を把握 → LLM で推論。推奨システム・マルチホップ質問応答で効果的。",y:"ぐらふ にゅーらる ねっとわーく えるえるえむ"},
  {id:744,cat:"最新モデル",q:"OpenAI の o1 シリーズ（o1-mini など）のアーキテクチャの特徴は？",a:"内部推論プロセスを拡張・複雑な問題に対応。チェーンオブソートをモデル内で実行。高精度だが推論時間増加。STEM分野・数学・プログラミングで優位。",y:"おーぷんえーあい おーわん てぃーきんぐ"},
  {id:745,cat:"プロンプト",q:"In-Context Learning（ICL）と Prompt Sensitivity の関係は？",a:"ICL：例示でタスク学習。しかし例示の順序・フォーマット変更で性能が大きく変動（Sensitivity）。対策：複数例示・説明付与・論理的構成。2025年の研究焦点。",y:"いんこんてきすと ぷろんぷと せんしてぃびてぃ"},
  {id:746,cat:"RAG・エージェント",q:"Cascade Models（小規模→大規模階層）による効率的な推論は？",a:"①小規模モデルで事前スクリーニング ②必要な場合のみ大規模モデルで詳細推論。計算量削減・応答速度向上。エッジAI・リアルタイムシステムで活躍。",y:"かすけーど もでる ぎゃくそう こうりつ"},
  {id:747,cat:"セキュリティ",q:"生成AIの出力に対する「Watermarking（ウォーターマーク）」技術の役割は？",a:"生成テキスト・画像に識別可能なマークを埋め込み。真正性検証・出元追跡・AI生成コンテンツ判定が可能。法的要件・著作権保護の観点から重要化。",y:"うぉーたーまーくすぎじゅつ ぶんしょう ぞぞう"},
  {id:748,cat:"著作権・倫理",q:"AI生成コンテンツの帰属・ライセンス表記の国際標準化は？",a:"①オーバーチュア・出版団体の共同声明②Creative Commons対応③EU AI Act への準拠。マシンリーダブルなメタデータの埋め込みが推進中。2026年の整備予定。",y:"きぞくひょうき らいせんす こくさい じゅんき"},
  {id:749,cat:"法規制",q:"各国 AI 規制の差分比較（EU AI Act vs 米国 Executive Order）は？",a:"EU：透明性・説明責任重視、厳格。米国：イノベーション優先、柔軟。日本：業界ガイドライン主流。企業は多地域対応が必須。",y:"えーあい あくと きせい こくさい"},
  {id:750,cat:"データ保護",q:"Federated Learning（連合学習）によるプライバシー保護の仕組みは？",a:"ローカルデバイスでモデル学習、重みだけ集約。ローデータは移動しない。医療・銀行等で活躍。ただしプライバシー逆算攻撃のリスク残在。",y:"ふぇでれーてっど らーにんぐ ぷらいばしー"},
  {id:751,cat:"AI基礎",q:"Reinforcement Learning from Human Feedback（RLHF）の 2026 年の進展は？",a:"Direct Preference Optimization（DPO）・IPO 等による簡略化。報酬モデル不要化・安定化。GPT-4 等で標準。多言語対応・分野特化 RLHF も加速。",y:"あーるえいち えふ ほうしゅう ぷれふぁらんす"},
  {id:752,cat:"ディープラーニング",q:"Instruction Tuning（命令チューニング）と Task-Specific Fine-tuning の違いは？",a:"Instruction Tuning：多様なタスク指示を与えて学習。汎用性向上。Task-Specific：単一タスクに特化。性能は高いが柔軟性低。現在は両者の融合「Hybrid Tuning」が研究中。",y:"いんすとらくしょん ちゅーにんぐ めいれい"},
  {id:753,cat:"生成AI技術",q:"Multimodal Fusion（マルチモーダル融合）の基本手法は？",a:"Early Fusion：入力段階で統合。Late Fusion：各モダリティ独立処理後に統合。Hybrid Fusion：中間層での統合。タスク・データ特性に応じて選択。",y:"まるちもーだる ゆーごう ふゅーじょん"},
  {id:754,cat:"LLM",q:"Self-Attention の複雑性改善「Performer」と Linformer の仕組みは？",a:"従来 Attention: O(n²)。Performer：確率的手法で O(n)。Linformer：特徴抽出で線形化。Long Context 対応・計算高速化で有効。トレードオフ：精度 vs 速度。",y:"ぱふぉーまー りんふぉーまー こんぷれっくすてぃ"},
  {id:755,cat:"プロンプト",q:"Zero-shot と Few-shot Learning の使い分けは？",a:"Zero-shot：例示なし。汎用性高・準備簡単。Few-shot：少数例示。精度向上。タスク複雑度・リソース制約で使い分け。In-context Learning の進化で効果が変動。",y:"ぜろしょっと ふぅしょっと れあにんぐ"},
  {id:756,cat:"RAG・エージェント",q:"Retrieval Ranking と Query Rewriting の組み合わせの効果は？",a:"Query Rewriting：曖昧な質問を明確化。Retrieval Ranking：関連度順に取得。二段階で検索精度向上。ハイブリッドアプローチで NDCG 改善率 30%。",y:"りとりーばる くえりー りらいてぃんぐ"},
  {id:757,cat:"セキュリティ",q:"LLM のメンバーシップ推論攻撃と対策は？",a:"攻撃：モデルの学習データに特定データが含まれているか推定。対策：Differential Privacy・Data Poisoning検知・Model Distillation。GDPR との関連性も高い。",y:"めんばーしっぷ すいろん こうげき"},
  {id:758,cat:"最新モデル",q:"Anthropic の Claude 3.5 Sonnet の改善点は？",a:"推論速度向上・多言語対応強化・日本語理解の精度向上・Long Context対応。Vision 能力も拡張。API エコシステムの充実。",y:"くろーど ぞねっと あんすろぷっく"},
  {id:759,cat:"プロンプト",q:"Chain-of-Thought（CoT）と Tree-of-Thought（ToT）の推論方式の違いは？",a:"CoT：単一の推論チェーン。ToT：複数の推論パスを並列探索。複雑問題でのTreeの方が精度向上。計算コスト増加がトレードオフ。",y:"ちぇいん おぶ そーと つりー おぶ そーと"},
  {id:760,cat:"法規制",q:"中国の「生成式AI サービス管理規則」と欧米との相違点は？",a:"内容管理・イデオロギー審査を重視。欧米はプライバシー・説明責任重視。グローバル企業は多地域対応が必須。2026年上期に国際規格調整の予定。",y:"ちゅうごく ちゅうかんりおく きせい こくさい"},
  {id:761,cat:"AI基礎",q:"Contrastive Learning と表現学習の関係は？",a:"異なるオブジェクトペアを「異なる」と学習、類似ペアを「同じ」と学習。埋め込み空間を分離・最適化。CLIP・SimCLR等で採用。多言語・マルチモーダル学習の基盤。",y:"こんとらすてぃぶ らーにんぐ ひょうげん"},
  {id:762,cat:"ディープラーニング",q:"Model Distillation（知識蒸留）の 2026 年の進展は？",a:"大規模モデル（Teacher）の知識を小規模モデル（Student）に転移。推論速度・メモリ削減。逆蒸留・相互蒸留で性能向上。エッジAI・モバイル必須技術。",y:"ちしき じゅうりゅう でぃすてぃれーしょん"},
  {id:763,cat:"生成AI技術",q:"Neural Architecture Search（NAS）と AutoML の最新事例は？",a:"モデルアーキテクチャを自動設計。Google AutoML、Meta等で採用。DARTS・EfficientNet等が誕生。計算コスト削減・最適化の自動化が進行。",y:"にゅーらる あーきてくちゃー さーち"},
  {id:764,cat:"LLM",q:"Mixture-of-Depths（深度混合）とは？",a:"層の深さをトークンごとに可変。必要な深さだけ処理。計算量削減・効率化。Google Gemini等で研究中。Token Router で制御。",y:"みっくすちゅあ おぶ でぷすず"},
  {id:765,cat:"最新モデル",q:"Microsoft の \"Phi\" シリーズと「Small Language Models」トレンドは？",a:"3B～14Bパラメータの高精度モデル。Phi-2・Phi-3等。モバイル・エッジでも優秀。VentureBeat等のベンチマーク上位。SLM 活況の象徴。",y:"ふぁい こむぱくと ぱらめーた"},
  {id:766,cat:"プロンプト",q:"Structured Prompting（構造化プロンプティング）の効果は？",a:"テンプレート・JSON形式・スキーマベースのプロンプト。出力の一貫性・制御性向上。Function Calling・Tool Use と組み合わせて強力。",y:"こうぞうか ぷろんぷと てんぷれーと"},
  {id:767,cat:"RAG・エージェント",q:"Multi-Agent 連携と Workflow Orchestration の実装パターンは？",a:"①各エージェント専門分野確立 ②中央 Orchestrator で統制 ③Task Queue で非同期処理。複雑問題の分割・統治。Dify・LangGraph で実装。",y:"またるるえーじぇんと れんけい"},
  {id:768,cat:"セキュリティ",q:"LLM の「Attribute Inference Attack（属性推論攻撃）」と対策は？",a:"攻撃：個人データを間接的に推定。対策：Differential Privacy・出力の粗粒度化・Federated Learning。プライバシー規制との関連性も高い。",y:"ぞくせい すいろん こうげき ぷらいばしー"},
  {id:769,cat:"著作権・倫理",q:"AI生成コンテンツの「Fair Use」判定の判例動向は？",a:"Google vs Oracle の判例ベース。①目的・性質②原著作物の性質③質・量④市場的影響が判定基準。2025-26年の著作権訴訟で実質判断予想。",y:"ふぇあ ゆーず ちょさくけん さいばん"},
  {id:770,cat:"法規制",q:"AI の「透明性（Transparency）」要件の実装ガイドライン化は？",a:"①モデル出力の根拠表示②学習データの開示範囲③アルゴリズム決定の説明④ユーザー权限。EU AI Act第13条で必須化。日本ガイドライン 2026 版で詳細化予定。",y:"とうめいせい あかうんたびりてぃ ぎゅうたいせいさく"},
  {id:771,cat:"データ保護",q:"Right to be Forgotten（忘れられる権利）と AI モデル更新の葛藤は？",a:"GDPR第17条：個人データ削除請求権。ただし LLM の学習済みモデルから完全削除は困難。対策：Unlearning・Retraining・Differential Privacy。未解決課題。",y:"わすれられる けんり るあーにんぐ"},
  {id:772,cat:"AI基礎",q:"Positional Encoding（位置エンコーディング）の進化は？",a:"従来：Sinusoidal Positional Embedding。新型：ALiBi（相対位置）・Rotary PE（RoPE）・FIRE等。Long Context 対応・外挿性改善。Llama 3 等で採用。",y:"いちえんこーでぃんぐ ろーぷいー"},
  {id:773,cat:"ディープラーニング",q:"Channel Attention 機構と Spatial Attention の効果的な組み合わせは？",a:"Squeeze-and-Excitation（SE）：チャネル。CBAM：チャネル+空間。NAM：空間。併用で精度向上。医療画像・物体検出で活躍。",y:"あてんしょん ちゃねる くうかん"},
  {id:774,cat:"生成AI技術",q:"Diffusion の「Unconditional vs Conditional 生成」の使い分けは？",a:"Unconditional：完全自由生成。Conditional：テキスト・画像から制御生成。実用性は Conditional が高い。ただし制御精度・計算コストが課題。Classifier-free Guidance で改善。",y:"でぃふゅーじょん じょうけん ぶじょうけん"},
  {id:775,cat:"LLM",q:"Key-Value Cache（KV Cache）の最適化と Memory-Efficient Attention は？",a:"従来：全トークンの KV を保存（O(n²)）。最適化：Token Merging・Sparse Cache・Low-rank Approximation。VLLM・Text Generation Webui で実装。推論速度 50%向上例。",y:"けーぶいきゃっしゅ めもりえふぃしゃんと"},
  {id:776,cat:"プロンプト",q:"「Meta-Prompting」と「Reflexion」の高度なプロンプティング手法は？",a:"Meta-Prompting：プロンプトを生成するプロンプト。Reflexion：出力を反省→改善→再出力。複雑推論・エラー修正で効果的。2025年の先端技術。",y:"めたぷろんぷと りふれくしょん"},
  {id:777,cat:"RAG・エージェント",q:"Hypothetical Document Embeddings（HyDE）による検索精度向上は？",a:"質問から仮想的な回答文書を生成→埋め込み→実際の文書検索。質問の意図を深く理解。BM25・Dense Retrieval と組み合わせ。精度 15～25%向上例。",y:"はいぽせてぃかる ぶんしょ えんべっでぃんぐ"},
  {id:778,cat:"セキュリティ",q:"生成AI の「Adversarial Examples（対抗例）」と防御戦略は？",a:"入力に微小な摂動を加え、誤分類誘発。防御：Adversarial Training・Detection・Certified Robustness。医療・金融で重要。SOTA 防御も突破される課題あり。",y:"たいこうれい あどばーさりある"},
  {id:779,cat:"法規制",q:"AI の「Explainability（説明性）」と「Interpretability（解釈性）」の法的要件化は？",a:"Explainability：出力の理由説明。Interpretability：モデル内部の理解。EU AI Act で High-Risk には両方要求。実装技術：LIME・SHAP・Attention Visualization。",y:"せつめいせい かいしゃくせい ぎゃくほう"},
  {id:780,cat:"データ保護",q:"Synthetic Data Generation（合成データ生成）によるプライバシー保護と課題は？",a:"実データの代わりに合成データで学習。差分プライバシー理論で保護。ただし合成データの多様性不足・バイアス導入リスク。医療・金融で活用拡大中。",y:"ごうせい でーた ぷらいばしー ぼうご"},
  {id:781,cat:"ディープラーニング",q:"Vision-Language Model（VLM）の「Cross-modal Alignment」の実装は？",a:"テキストと画像の特徴空間を統一。CLIP・LLaVA等で採用。Contrastive Loss・Triplet Loss で最適化。マルチモーダル検索・推奨システムで活躍。",y:"くろすもーだる あるいんめんと"},
  {id:782,cat:"生成AI技術",q:"Retrieval-Augmented Generation（RAG）と Fine-tuning の使い分けは？",a:"RAG：外部知識活用、ホットな情報対応。Fine-tuning：モデル内部改変、永続的適応。大規模変更は Fine-tuning、特定分野情報は RAG。実装では両者の融合「Hybrid」が主流。",y:"らぐ ふぁいんちゅーにんぐ ひかく"},
  {id:783,cat:"LLM",q:"Byte Tokenizer と Byte Pair Encoding（BPE）の効率比較は？",a:"Byte Tokenizer：文字列の最小単位（UTF-8）で処理。語彙依存性低・多言語対応優秀。BPE：出現頻度ベース。計算効率良好。現在は Byte Tokenizer が次世代標準化予想。",y:"ばいと ときないぜーしょん こうりつ"},
  {id:784,cat:"最新モデル",q:"Anthropic の Constitutional AI（CAI）と RLHF の差分は？",a:"CAI：憲法的な原則で AI を規制。RLHF の上位概念。明示的な価値観・倫理基準を埋め込み。GPT-4 等で採用。安全性・信頼性向上。",y:"けんぽう あい せいせい かい"},
  {id:785,cat:"プロンプト",q:"Role-Playing Prompts と Task-Oriented Prompts の効果比較は？",a:"Role-Playing：「あなたは医師です」等でロール付与。Task-Oriented：直接的なタスク指定。複雑推論は Role-Playing が優位。実装では両者を組み合わせ。",y:"ろーるぷれいいんぐ たすくおりえんてっど"},
  {id:786,cat:"RAG・エージェント",q:"Semantic Search と Keyword Search のハイブリッド検索は？",a:"Semantic：意味理解ベースの検索（Dense Retrieval）。Keyword：BM25等の従来型。ハイブリッド：両者の結果を融合。相互補完で精度 20%向上例。",y:"せまんてぃっく きーわーど はいぶりっど"},
  {id:787,cat:"セキュリティ",q:"生成AI の「Model Stealing Attack（モデル盗難攻撃）」と対策は？",a:"攻撃：API クエリから逆推定でモデルを再現。対策：Query Limiting・Output Obfuscation・Model Watermarking。新興脅威として注視。",y:"もでる すてぃーりんぐ あたっく"},

  {id:789,cat:"法規制",q:"各業界の AI 規制ガイドライン（医療・金融・自動車）の差分は？",a:"医療：診断補助のみ・人間監督必須。金融：判定根拠説明義務・差別検査。自動車：安全基準・責任分界点。各業界で要件異なる。",y:"ぎょうかい きせい ぶんや"},

  {id:795,cat:"プロンプト",q:"Dynamic Prompting と Adaptive Prompting の機能の違いは？",a:"Dynamic：実行時にプロンプト内容変更。Adaptive：LLM出力に応じて次のプロンプト調整。後者がより高度。両者でインタラクティブ性向上。",y:"どなみっく あだぷてぃぶ ぷろんぷと"},
  {id:796,cat:"RAG・エージェント",q:"Knowledge Graph（知識グラフ）と RAG の統合手法は？",a:"KG を外部知識源として RAG に統合。①エンティティ抽出②KG クエリ③結果取得④生成。KGQA（Knowledge Graph Question Answering）で実装。構造化知識活用が強力。",y:"ちしき ぐらふ らぐ とうごう"},
  {id:797,cat:"セキュリティ",q:"LLM の「Hallucination（幻覚）」と「Factuality（事実性）」の改善策は？",a:"原因：トレーニングデータ不足・過学習。改善：①Fact-checking機構②知識統合③RLHF。RAG との組み合わせが有効。",y:"げんそう ふぁくちゅありてぃ かいぜん"},
  {id:798,cat:"著作権・倫理",q:"オープンソース AI モデルとクローズドモデルの法的責任の違いは？",a:"オープンソース：モデル公開で利用者が責任。クローズド：企業が集中管理・責任。ただし両者の責任分界点は不明確。業界ガイドライン制定中。",y:"おーぷん そーす くろーずど せきにん"},
  {id:799,cat:"法規制",q:"AI の「Algorithmic Accountability（アルゴリズム責任）」の実装要件は？",a:"①決定根拠の説明②監査ログ③是正機構④監督者の設置。EU AI Act・各国ガイドラインで規定。企業コンプライアンスの新境地。",y:"あるごりずむ せきにん あかうんたびりてぃ"},
  {id:800,cat:"データ保護",q:"Data Privacy and Protection Regulation（データ規制）の国際動向は？",a:"GDPR（EU）・CCPA（米国）・PIPL（中国）・APPI（日本）。地域ごとに異なる。多国籍企業は全対応必須。標準化動き始まり。2026年に世界統一ガイドライン検討。",y:"でーた ぷらいばしー こくさい きせい"},
  {id:801,cat:"AI基礎",q:"Softmax と Gumbel-Softmax の推論への応用は？",a:"Softmax：確定的な確率分布。Gumbel-Softmax：確率的サンプリング。Gumbel-Softmax は勾配推定で学習可能。変分推論・強化学習で活躍。",y:"そふとまっくす がむべるそふとまっくす"},

// カタカナ→ひらがな変換
function toHiragana(str) {
  return str.replace(/[\u30A1-\u30F6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}

// ひらがな→カタカナ変換
function toKatakana(str) {
  return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

// テキストに漢字よみがなを展開して正規化検索用インデックスを生成
function buildSearchIndex(str) {
  let expanded = str;
  for (const [kanji, yomi] of KANJI_YOMI) {
    expanded = expanded.replaceAll(kanji, kanji + ' ' + yomi + ' ');
  }
  return toHiragana(expanded).toLowerCase();
}

// 正規化（クエリ用）：カタカナ→ひらがな＋小文字
function normalize(str) {
  return toHiragana(str).toLowerCase();
}

});

  return map[cat] || 'tag-ai';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const qOrig = esc(query);
  const qH = esc(toHiragana(query));
  const qK = esc(query.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)));
  const patterns = [...new Set([qOrig, qH, qK])].filter(Boolean);
  try {
    return escaped.replace(new RegExp(`(${patterns.join('|')})`, 'gi'), m => `<mark>${m}</mark>`);
  } catch { return escaped; }
}

function renderCards(filtered, query) {
  const container = document.getElementById('cardContainer');
  const noResults = document.getElementById('noResults');
  document.getElementById('hitCount').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  const html = filtered.map(q => {
    const catClass = getCatClass(q.cat);
    return `<div class="card" data-id="${q.id}">
      <div class="card-header">
        <span class="card-num">#${String(q.id).padStart(3,'0')}</span>
        <div>
          <span class="card-tag ${catClass}">${q.cat}</span>
          <div class="card-q">${highlight(q.q, query)}</div>
        </div>
      </div>
      <div class="card-a">${highlight(q.a, query)}</div>
    </div>`;
  }).join('');
  container.innerHTML = html;
}

function filterAndRender() {
  const query = currentQuery;
  const cat = currentCat;
  // クエリもひらがな統一・小文字化（スペース区切りでAND検索）
  const terms = normalize(query).split(/\s+/).filter(Boolean);

  const filtered = QUESTIONS.filter(item => {
    const catMatch = cat === 'ALL' || item.cat === cat;
    if (!catMatch) return false;
    if (terms.length === 0) return true;
    // 全タームがインデックスに含まれればマッチ（AND検索）
    return terms.every(term => item._idx.includes(term));
  });

  renderCards(filtered, query);
}

// Search input
document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value.trim();
  filterAndRender();
});

// Category filter
document.getElementById('catFilter').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  filterAndRender();
});

// Scroll top
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

// Init
renderCards(QUESTIONS, '');
</script>
</body>
</html>
